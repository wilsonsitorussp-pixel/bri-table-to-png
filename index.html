<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>BRI Table Exporter • Stabil</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1b36;
      padding: 16px;
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #E8821A;
    }
    .sub {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 24px;
    }
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 40px 20px;
      text-align: center;
      background: rgba(255,255,255,0.03);
      margin-bottom: 24px;
      cursor: pointer;
    }
    .upload-area:hover { background: rgba(255,255,255,0.06); }
    #fileInput { display: none; }
    .btn {
      background: #E8821A;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      margin: 5px;
    }
    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #E8821A;
      color: #E8821A;
      box-shadow: none;
    }
    #status {
      margin: 16px 0;
      color: #aaccff;
      font-weight: 500;
    }
    .tables-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }
    .table-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      flex: 1 1 600px;
      max-width: 100%;
      overflow-x: auto;
    }
    .table-title {
      font-size: 18px;
      font-weight: bold;
      color: #E8821A;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .preview-table {
      background: white;
      border-radius: 8px;
      padding: 16px;
      display: inline-block;
      min-width: 100%;
    }
    table {
      border-collapse: collapse;
      font-size: 12px;
      background: white;
      width: 100%;
      border: 1px solid #1B3A6B;
    }
    th {
      background: #1B3A6B;
      color: white;
      padding: 8px 6px;
      text-align: center;
      border: 1px solid #2a4a7a;
      white-space: nowrap;
    }
    td {
      padding: 6px 5px;
      text-align: center;
      border: 1px solid #b0c4de;
      white-space: nowrap;
    }
    tr:nth-child(even) { background: #f0f5ff; }
    .total-row { background: #1B3A6B !important; color: white; font-weight: bold; }
    .footer {
      margin-top: 30px;
      text-align: center;
      opacity: 0.5;
      font-size: 13px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📊 BRI Table Exporter</h1>
  <div class="sub">Upload Excel → 6 Tabel → Download PNG</div>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <div style="font-size: 40px; margin-bottom: 10px;">📁</div>
    <div style="font-weight: 600; margin-bottom: 5px;">Klik untuk Pilih File Excel</div>
    <div style="font-size: 13px; opacity: 0.6;">.xlsx atau .xls</div>
  </div>
  <input type="file" id="fileInput" accept=".xlsx, .xls">

  <div id="status"></div>

  <div style="display: flex; gap: 10px; flex-wrap: wrap;">
    <button class="btn" id="downloadAllBtn" onclick="downloadAllTables()" disabled>⬇ Download Semua Tabel</button>
    <button class="btn btn-outline" onclick="resetAll()">🔄 Reset</button>
  </div>

  <div id="tablesContainer" class="tables-grid"></div>
  <div class="footer">Kolom A-H • Header dinamis • Gap dengan tanda kurung</div>
</div>

<script>
  // --- GLOBAL VARIABLES ---
  let globalTables = [];       // array of { category, element, title }
  let globalDateStr = '';
  const MAX_COLS = 8;          // fokus hanya kolom A-H
  const CATEGORIES = ["Realisasi", "Recovery DH", "Kualitas Dpk", "Kualitas Npl", "SIMPANAN", "QRIS"];

  const statusEl = document.getElementById('status');
  const container = document.getElementById('tablesContainer');
  const downloadAllBtn = document.getElementById('downloadAllBtn');
  const fileInput = document.getElementById('fileInput');

  // --- Helper: format number Indonesia ---
  function fmtNumber(v) {
    if (v === '' || v === null || v === undefined) return '';
    let num = Number(v);
    if (isNaN(num)) return String(v);
    return num.toLocaleString('id-ID');
  }

  function fmtGap(v) {
    if (v === '' || v === null || v === undefined) return '';
    let num = Number(v);
    if (isNaN(num)) return String(v);
    if (num < 0) return `(${Math.abs(num).toLocaleString('id-ID')})`;
    if (num === 0) return '-';
    return num.toLocaleString('id-ID');
  }

  function fmtRate(v) {
    if (v === '' || v === null || v === undefined) return '0,0%';
    if (typeof v === 'number') {
      let pct = Math.abs(v) < 1 ? v * 100 : v;
      return pct.toFixed(1).replace('.', ',') + '%';
    }
    let s = String(v);
    if (s.includes('#')) return s;
    return s;
  }

  // --- PARSING EXCEL (fokus A-H, deteksi header dinamis) ---
  function parseExcel(arrayBuffer) {
    const wb = XLSX.read(arrayBuffer, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rawData = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    // Potong hanya 8 kolom pertama
    const data = rawData.map(row => row.slice(0, MAX_COLS));

    // Cari tanggal
    let dateStr = '';
    for (let i = 0; i < Math.min(6, data.length); i++) {
      for (let cell of data[i]) {
        let s = String(cell);
        if (s.match(/\d{2}\/\d{2}\/\d{4}/)) { dateStr = s; break; }
      }
    }

    const tables = [];
    let i = 0;
    while (i < data.length) {
      const row = data[i];
      if (!row || row.length === 0) { i++; continue; }

      // Deteksi header: kolom pertama harus "NO"
      const firstCell = String(row[0] || '').trim().toUpperCase();
      if (firstCell !== 'NO' && firstCell !== 'NO.') { i++; continue; }

      // Cari kategori di baris ini
      let category = null;
      for (let cat of CATEGORIES) {
        if (row.some(c => String(c).trim().toUpperCase() === cat.toUpperCase())) {
          category = cat;
          break;
        }
      }
      if (!category) { i++; continue; }

      const mainHeader = row;
      const catIndex = mainHeader.findIndex(c => String(c).trim().toUpperCase() === category.toUpperCase());

      // Cari sub-header (baris dengan "Komitmen"/"Hasil"/"Gap")
      let subHeader = null;
      let subIndex = -1;
      for (let j = i+1; j < i+4 && j < data.length; j++) {
        const cand = data[j];
        const str = cand.map(c => String(c).toUpperCase()).join(' ');
        if (str.includes('KOMITMEN') || str.includes('HASIL') || str.includes('GAP')) {
          subHeader = cand;
          subIndex = j;
          break;
        }
      }

      // Tentukan sub-kolom
      let subCols = [];
      if (subHeader) {
        for (let col = catIndex; col < subHeader.length; col++) {
          const val = String(subHeader[col] || '').trim().toUpperCase();
          if (['KOMITMEN', 'HASIL', 'GAP', 'REALISASI'].includes(val)) {
            subCols.push({ label: val, colIndex: col });
          } else if (val === '' && subCols.length > 0) break;
        }
      }

      const hasSub = subCols.length > 0;
      const dataStartCol = hasSub ? subCols[0].colIndex : catIndex;
      const dataColCount = hasSub ? subCols.length : 1;
      const dataStartRow = hasSub ? subIndex + 1 : i + 1;

      // Kumpulkan baris data
      const rows = [];
      for (let r = dataStartRow; r < dataStartRow + 20 && r < data.length; r++) {
        const dRow = data[r];
        if (dRow.every(c => c === '' || c === null || c === undefined)) break;
        rows.push([...dRow]);
        if (String(dRow[0] || '').toUpperCase().includes('TOTAL')) break;
      }

      tables.push({
        category,
        mainHeader,
        subHeader,
        subCols,
        catIndex,
        dataStartCol,
        dataColCount,
        rows
      });

      i = dataStartRow + rows.length;
    }

    return { dateStr, tables };
  }

  // --- RENDER TABEL KE HTML ---
  function renderTables(parsed) {
    globalDateStr = parsed.dateStr;
    globalTables = [];
    container.innerHTML = '';

    parsed.tables.forEach((t, idx) => {
      const { category, mainHeader, subCols, catIndex, dataStartCol, dataColCount, rows } = t;
      const hasSub = subCols.length > 0;

      // Buat wrapper
      const card = document.createElement('div');
      card.className = 'table-card';
      
      const titleDiv = document.createElement('div');
      titleDiv.className = 'table-title';
      titleDiv.innerHTML = `${idx+1}. ${category} <button class="btn" style="padding:6px 14px;font-size:13px;" onclick="downloadSingle(${idx})">⬇ PNG</button>`;
      card.appendChild(titleDiv);

      const previewDiv = document.createElement('div');
      previewDiv.className = 'preview-table';
      
      // Buat tabel
      const table = document.createElement('table');
      
      // THEAD
      const thead = document.createElement('thead');
      
      // Baris header utama
      const tr1 = document.createElement('tr');
      for (let col = 0; col < mainHeader.length; col++) {
        if (col === catIndex) {
          const th = document.createElement('th');
          th.colSpan = dataColCount;
          th.style.background = '#E8821A';
          th.textContent = category;
          tr1.appendChild(th);
        } else if (col > catIndex && col < catIndex + dataColCount) {
          // dilewati
        } else {
          const th = document.createElement('th');
          th.textContent = mainHeader[col] || '';
          th.style.whiteSpace = 'nowrap';
          tr1.appendChild(th);
        }
      }
      // Rowspan untuk header utama jika ada sub
      if (hasSub) {
        tr1.querySelectorAll('th').forEach(th => { if (th.colSpan !== dataColCount) th.rowSpan = 2; });
      }
      thead.appendChild(tr1);

      // Baris sub-header jika ada
      if (hasSub) {
        const tr2 = document.createElement('tr');
        subCols.forEach(sc => {
          const th = document.createElement('th');
          th.textContent = sc.label;
          tr2.appendChild(th);
        });
        thead.appendChild(tr2);
      }

      table.appendChild(thead);

      // TBODY
      const tbody = document.createElement('tbody');
      rows.forEach((row, ri) => {
        const isTotal = String(row[0] || '').toUpperCase().includes('TOTAL');
        const tr = document.createElement('tr');
        if (isTotal) tr.classList.add('total-row');

        // Sel kiri (sebelum kategori)
        for (let col = 0; col < catIndex; col++) {
          const td = document.createElement('td');
          let val = row[col] || '';
          if (col === 3) td.style.textAlign = 'center'; // Σ MANTRI
          td.textContent = val;
          if (isTotal) { td.style.color = 'white'; td.style.fontWeight = 'bold'; }
          tr.appendChild(td);
        }

        // Sel data
        for (let d = 0; d < dataColCount; d++) {
          const td = document.createElement('td');
          let val = row[dataStartCol + d] || '';
          if (d === dataColCount - 1) {
            td.textContent = fmtGap(val);
            if (Number(val) < 0) td.style.color = '#b5351c';
          } else {
            td.textContent = fmtNumber(val);
          }
          if (isTotal) { td.style.color = 'white'; td.style.fontWeight = 'bold'; }
          tr.appendChild(td);
        }

        // Sel sukses rate (setelah data)
        const rateIdx = dataStartCol + dataColCount;
        if (rateIdx < row.length) {
          const td = document.createElement('td');
          td.textContent = fmtRate(row[rateIdx]);
          td.style.background = '#FFF3E0';
          td.style.color = '#E8821A';
          td.style.fontWeight = 'bold';
          tr.appendChild(td);
        }

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      previewDiv.appendChild(table);
      card.appendChild(previewDiv);
      container.appendChild(card);

      // Simpan referensi untuk screenshot
      globalTables.push({
        category,
        element: previewDiv,
        title: category
      });
    });

    downloadAllBtn.disabled = globalTables.length === 0;
    statusEl.textContent = `✅ ${globalTables.length} tabel ditemukan. ${globalDateStr}`;
  }

  // --- HANDLE UPLOAD ---
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    statusEl.textContent = '⏳ Membaca file...';
    try {
      const buf = await file.arrayBuffer();
      const parsed = parseExcel(buf);
      renderTables(parsed);
    } catch (err) {
      statusEl.textContent = '❌ Error: ' + err.message;
      console.error(err);
    }
  });

  // --- DOWNLOAD SATU TABEL ---
  async function downloadSingle(index) {
    const item = globalTables[index];
    if (!item) return;
    const el = item.element;
    try {
      // Pastikan terlihat
      el.style.visibility = 'visible';
      const canvas = await html2canvas(el, {
        scale: 2.5,
        backgroundColor: '#ffffff',
        logging: false,
        allowTaint: false,
        useCORS: true
      });
      const link = document.createElement('a');
      link.download = `${item.category.replace(/ /g,'_')}_${globalDateStr.replace(/\//g,'-')}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (e) {
      alert('Gagal download: ' + e.message);
    }
  }

  // --- DOWNLOAD SEMUA ---
  async function downloadAllTables() {
    for (let i = 0; i < globalTables.length; i++) {
      statusEl.textContent = `📸 Mendownload ${i+1}/${globalTables.length}...`;
      await downloadSingle(i);
      await new Promise(r => setTimeout(r, 300));
    }
    statusEl.textContent = `✅ Selesai! ${globalTables.length} gambar diunduh.`;
  }

  function resetAll() {
    globalTables = [];
    container.innerHTML = '';
    downloadAllBtn.disabled = true;
    statusEl.textContent = '';
    fileInput.value = '';
  }

  // Expose ke global
  window.downloadSingle = downloadSingle;
  window.downloadAllTables = downloadAllTables;
  window.resetAll = resetAll;
</script>
</body>
</html>
