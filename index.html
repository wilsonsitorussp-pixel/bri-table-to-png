<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRI Table Exporter • Fokus A-H</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const BRI_BLUE = "#1B3A6B";
    const BRI_ORANGE = "#E8821A";
    const BRI_LIGHT = "#EEF3FA";

    // Kategori yang dicari (case-insensitive) – akan dicocokkan dengan isi header
    const CATEGORIES = [
      "Realisasi",
      "Recovery DH",
      "Kualitas Dpk",
      "Kualitas Npl",
      "SIMPANAN",
      "QRIS",
    ];

    function loadHtml2Canvas() {
      return new Promise((resolve) => {
        if (window.html2canvas) { resolve(window.html2canvas); return; }
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
        s.onload = () => resolve(window.html2canvas);
        document.head.appendChild(s);
      });
    }

    // Batasi hanya kolom A-H (8 kolom)
    const MAX_COLS = 8;

    function parseExcelFile(arrayBuffer) {
      const wb = XLSX.read(arrayBuffer, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      // Baca semua data, batasi ke 8 kolom pertama
      const rawData = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      const data = rawData.map(row => row.slice(0, MAX_COLS));

      let dateStr = "";
      for (let i = 0; i < Math.min(6, data.length); i++) {
        for (const cell of data[i]) {
          const s = String(cell);
          if (s.match(/\d{2}\/\d{2}\/\d{4}/)) { dateStr = s; break; }
        }
      }

      const tables = [];
      let i = 0;
      while (i < data.length) {
        const row = data[i];
        if (!row || row.length === 0) { i++; continue; }

        // Cek apakah baris ini adalah header tabel (kolom pertama "NO")
        const firstCell = String(row[0] || "").trim().toUpperCase();
        if (firstCell !== "NO" && firstCell !== "NO.") { i++; continue; }

        // Cari kategori di baris ini (biasanya di kolom ke-5, index 4)
        let foundCategory = null;
        for (const cat of CATEGORIES) {
          if (row.some(c => String(c).trim().toUpperCase() === cat.toUpperCase())) {
            foundCategory = cat;
            break;
          }
        }
        if (!foundCategory) { i++; continue; }

        const mainHeaderRow = row;
        const categoryColIndex = mainHeaderRow.findIndex(c => String(c).trim().toUpperCase() === foundCategory.toUpperCase());

        // Cari baris sub-header (mengandung "Komitmen", "Hasil", "Gap")
        let subHeaderRow = null;
        let subHeaderIndex = -1;
        for (let j = i+1; j < i+4 && j < data.length; j++) {
          const candidate = data[j];
          const candidateStr = candidate.map(c => String(c).toUpperCase()).join(" ");
          if (candidateStr.includes("KOMITMEN") || candidateStr.includes("HASIL") || candidateStr.includes("GAP")) {
            subHeaderRow = candidate;
            subHeaderIndex = j;
            break;
          }
        }

        // Tentukan sub-kolom
        let subCols = [];
        if (subHeaderRow) {
          for (let col = categoryColIndex; col < subHeaderRow.length; col++) {
            const val = String(subHeaderRow[col] || "").trim().toUpperCase();
            if (["KOMITMEN", "HASIL", "GAP", "REALISASI"].includes(val)) {
              subCols.push({ label: val, colIndex: col });
            } else if (val === "" && subCols.length > 0) {
              break;
            }
          }
        }

        const hasSub = subCols.length > 0;
        const dataColStart = hasSub ? subCols[0].colIndex : categoryColIndex;
        const dataColCount = hasSub ? subCols.length : 1;
        const dataStartRow = hasSub ? subHeaderIndex + 1 : i + 1;

        // Kumpulkan baris data
        const rows = [];
        for (let r = dataStartRow; r < dataStartRow + 15 && r < data.length; r++) {
          const dataRow = data[r];
          if (dataRow.every(c => c === "" || c === null || c === undefined)) break;
          // Jika baris mengandung "TOTAL" di kolom pertama
          if (String(dataRow[0] || "").toUpperCase().includes("TOTAL")) {
            rows.push(dataRow);
            break;
          }
          rows.push(dataRow);
        }

        tables.push({
          category: foundCategory,
          mainHeaderRow,
          subHeaderRow,
          subCols,
          categoryColIndex,
          dataColStart,
          dataColCount,
          rows,
        });

        // Lompat ke setelah blok ini
        i = dataStartRow + rows.length;
      }

      return { dateStr, tables };
    }

    // Formatter
    function fmt(v) {
      if (v === "" || v === null || v === undefined) return "";
      const n = Number(v);
      if (isNaN(n)) return String(v);
      return n.toLocaleString("id-ID");
    }

    function fmtGap(v) {
      if (v === "" || v === null || v === undefined) return "";
      const n = Number(v);
      if (isNaN(n)) return String(v);
      if (n < 0) return `(${Math.abs(n).toLocaleString("id-ID")})`;
      if (n === 0) return "-";
      return n.toLocaleString("id-ID");
    }

    function fmtRate(v) {
      if (v === "" || v === null || v === undefined) return "0,0%";
      if (typeof v === "number") {
        const pct = Math.abs(v) < 1 ? v * 100 : v;
        return pct.toFixed(1).replace(".", ",") + "%";
      }
      const s = String(v);
      if (s.includes("#")) return s;
      return s;
    }

    function TableCard({ data, dateStr }) {
      const { category, mainHeaderRow, subHeaderRow, subCols, categoryColIndex, dataColStart, dataColCount, rows } = data;
      const hasSub = subCols.length > 0;
      
      const th = (bg, extra = {}) => ({
        background: bg, color: "#fff", padding: "6px 9px",
        border: "1px solid rgba(255,255,255,0.15)", fontWeight: 700,
        textAlign: "center", fontSize: 11, whiteSpace: "nowrap", ...extra,
      });
      const td = (bg, color = "#2c3e50", fw = 400, align = "right") => ({
        background: bg, color, fontWeight: fw,
        padding: "5px 8px", border: "1px solid #ccd8ee",
        textAlign: align, fontSize: 11, whiteSpace: "nowrap",
      });

      // Kolom BRI UNIT (index 2) dan Σ MANTRI (index 3) perlu penanganan khusus
      const briUnitIndex = 2;
      const mantriIndex = 3;

      return (
        <div style={{ fontFamily: "Arial, sans-serif", padding: "14px 16px 16px", background: "#fff", display: "inline-block" }}>
          <div style={{ textAlign: "center", marginBottom: 8 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "#1a1a2e", letterSpacing: 0.5 }}>POSISI</div>
            <div style={{ fontWeight: 700, fontSize: 12, color: BRI_ORANGE }}>{dateStr}</div>
          </div>
          <table style={{ borderCollapse: "collapse", minWidth: 600, tableLayout: "auto" }}>
            <thead>
              <tr>
                {mainHeaderRow.slice(0, categoryColIndex).map((cell, idx) => {
                  let extraStyle = {};
                  if (idx === briUnitIndex) extraStyle = { minWidth: 150, whiteSpace: "nowrap" };
                  if (idx === mantriIndex) extraStyle = { textAlign: "center" };
                  return (
                    <th key={idx} rowSpan={hasSub ? 2 : 1} style={th(BRI_BLUE, extraStyle)}>
                      {String(cell)}
                    </th>
                  );
                })}
                <th colSpan={dataColCount} style={th(BRI_ORANGE)}>{category}</th>
                {mainHeaderRow.slice(categoryColIndex + 1).map((cell, idx) => {
                  const colIdx = categoryColIndex + 1 + idx;
                  if (hasSub && subCols.some(sc => sc.colIndex === colIdx)) return null;
                  return (
                    <th key={idx} rowSpan={hasSub ? 2 : 1} style={th(BRI_BLUE)}>
                      {String(cell)}
                    </th>
                  );
                })}
              </tr>
              {hasSub && (
                <tr>
                  {subCols.map((sc, idx) => (
                    <th key={idx} style={th(BRI_BLUE)}>{sc.label}</th>
                  ))}
                </tr>
              )}
            </thead>
            <tbody>
              {rows.map((row, ri) => {
                const isTotal = String(row[0] || "").toUpperCase().includes("TOTAL");
                const bg = isTotal ? BRI_BLUE : ri % 2 === 0 ? BRI_LIGHT : "#fff";
                
                const leftCells = row.slice(0, categoryColIndex);
                const dataCells = row.slice(dataColStart, dataColStart + dataColCount);
                const rateCell = row[dataColStart + dataColCount] || "";

                if (isTotal) {
                  return (
                    <tr key={ri}>
                      <td colSpan={categoryColIndex} style={td(BRI_BLUE, "#fff", 700, "center")}>TOTAL</td>
                      {dataCells.map((c, i) => (
                        <td key={i} style={td(BRI_BLUE, "#fff", 700)}>
                          {i === dataColCount-1 ? fmtGap(c) : fmt(c)}
                        </td>
                      ))}
                      <td style={td("#FFF3E0", BRI_ORANGE, 700, "center")}>{fmtRate(rateCell)}</td>
                    </tr>
                  );
                }

                return (
                  <tr key={ri}>
                    {leftCells.map((c, idx) => {
                      let align = "left";
                      let fontWeight = 400;
                      let color = "#333";
                      if (idx === 0) { align = "center"; fontWeight = 700; color = BRI_BLUE; }
                      if (idx === mantriIndex) align = "center";
                      if (idx === briUnitIndex) align = "left";
                      return (
                        <td key={idx} style={td(bg, color, fontWeight, align)}>
                          {String(c)}
                        </td>
                      );
                    })}
                    {dataCells.map((c, i) => (
                      <td key={i} style={td(bg, i === dataColCount-1 && Number(c) < 0 ? "#b5351c" : "#333")}>
                        {i === dataColCount-1 ? fmtGap(c) : fmt(c)}
                      </td>
                    ))}
                    <td style={td("#FFF3E0", BRI_ORANGE, 700, "center")}>{fmtRate(rateCell)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    function App() {
      const [tables, setTables] = React.useState([]);
      const [dateStr, setDateStr] = React.useState("");
      const [loading, setLoading] = React.useState(false);
      const [capturing, setCapturing] = React.useState(null);
      const [dragging, setDragging] = React.useState(false);
      const [progress, setProgress] = React.useState("");
      const tableRefs = React.useRef({});
      const fileInputRef = React.useRef(null);

      const handleFile = React.useCallback(async (file) => {
        if (!file) return;
        setLoading(true);
        setProgress("Membaca file...");
        try {
          const buf = await file.arrayBuffer();
          const result = parseExcelFile(buf);
          setDateStr(result.dateStr || "");
          setTables(result.tables);
          setProgress(`${result.tables.length} tabel ditemukan`);
        } catch (e) {
          alert("Gagal membaca file: " + e.message);
          setProgress("");
        }
        setLoading(false);
      }, []);

      const downloadOne = async (idx) => {
        const el = tableRefs.current[idx];
        if (!el) return;
        setCapturing(idx);
        try {
          // Pastikan elemen terlihat dan memiliki ukuran
          el.style.visibility = "visible";
          el.style.display = "inline-block";
          
          // Tunggu sebentar agar render sempurna
          await new Promise(r => setTimeout(r, 100));
          
          const h2c = await loadHtml2Canvas();
          const canvas = await h2c(el, { 
            scale: 2.5, 
            backgroundColor: "#ffffff", 
            logging: false, 
            useCORS: true,
            allowTaint: false,
            windowWidth: el.scrollWidth,
            windowHeight: el.scrollHeight
          });
          const a = document.createElement("a");
          const catName = tables[idx]?.category?.replace(/ /g, "_") || `tabel_${idx+1}`;
          a.download = `${catName}_${(dateStr || "posisi").replace(/\//g, "-")}.png`;
          a.href = canvas.toDataURL("image/png");
          a.click();
        } catch (e) {
          alert("Error: " + e.message);
        }
        setCapturing(null);
      };

      const downloadAll = async () => {
        for (let i = 0; i < tables.length; i++) {
          setProgress(`Downloading ${i+1}/${tables.length}...`);
          await downloadOne(i);
          await new Promise(r => setTimeout(r, 300));
        }
        setProgress("✅ Semua selesai didownload!");
        setTimeout(() => setProgress(""), 3000);
      };

      const reset = () => { setTables([]); setDateStr(""); setProgress(""); };

      const s = {
        wrap: { minHeight: "100vh", background: `linear-gradient(145deg, #0d1b36 0%, #1a2f5a 100%)`, padding: "20px 14px", fontFamily: "'Segoe UI', Arial, sans-serif" },
        header: { textAlign: "center", marginBottom: 24 },
        logo: { display: "inline-flex", alignItems: "center", gap: 12, background: "rgba(255,255,255,0.06)", borderRadius: 14, padding: "12px 22px", border: `1px solid ${BRI_ORANGE}55` },
        logoTitle: { color: BRI_ORANGE, fontWeight: 800, fontSize: 17, letterSpacing: 1.5 },
        logoSub: { color: "rgba(255,255,255,0.45)", fontSize: 11, marginTop: 2 },
        dropzone: (drag) => ({ border: `2px dashed ${drag ? BRI_ORANGE : "rgba(255,255,255,0.18)"}`, borderRadius: 16, padding: "44px 24px", textAlign: "center", cursor: "pointer", background: drag ? "rgba(232,130,26,0.07)" : "rgba(255,255,255,0.02)", transition: "all 0.2s", maxWidth: 480, margin: "0 auto" }),
        dropIcon: { fontSize: 48, marginBottom: 12 },
        dropTitle: { color: "#fff", fontWeight: 600, fontSize: 16, marginBottom: 6 },
        dropSub: { color: "rgba(255,255,255,0.4)", fontSize: 13 },
        bar: { display: "flex", justifyContent: "space-between", alignItems: "center", maxWidth: 940, margin: "0 auto 16px", flexWrap: "wrap", gap: 8 },
        info: { color: "rgba(255,255,255,0.55)", fontSize: 13 },
        btnOrange: { padding: "8px 18px", background: BRI_ORANGE, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 700 },
        btnGhost: { padding: "7px 14px", background: "rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.8)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 8, cursor: "pointer", fontSize: 12 },
        grid: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(600px, 1fr))", gap: 18, maxWidth: 1280, margin: "0 auto" },
        card: { background: "rgba(255,255,255,0.04)", borderRadius: 12, padding: 16, border: "1px solid rgba(255,255,255,0.08)", overflow: "auto" },
        cardHead: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 },
        catLabel: { color: BRI_ORANGE, fontWeight: 700, fontSize: 14 },
        btnBlue: (disabled) => ({ padding: "6px 14px", background: disabled ? "#445" : BRI_BLUE, color: "#fff", border: "none", borderRadius: 7, cursor: disabled ? "default" : "pointer", fontSize: 12, fontWeight: 600 }),
        progress: { textAlign: "center", color: "rgba(255,255,255,0.5)", fontSize: 13, marginTop: 12 },
      };

      return (
        <div style={s.wrap}>
          <div style={s.header}>
            <div style={s.logo}>
              <span style={{ fontSize: 26 }}>📊</span>
              <div>
                <div style={s.logoTitle}>BRI TABLE EXPORTER</div>
                <div style={s.logoSub}>Upload Excel → Fokus Kolom A-H → PNG</div>
              </div>
            </div>
          </div>

          {tables.length === 0 && (
            <div
              onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
              onDragLeave={() => setDragging(false)}
              onDrop={(e) => { e.preventDefault(); setDragging(false); handleFile(e.dataTransfer.files[0]); }}
              onClick={() => fileInputRef.current?.click()}
              style={s.dropzone(dragging)}
            >
              <div style={s.dropIcon}>{loading ? "⏳" : "📁"}</div>
              <div style={s.dropTitle}>{loading ? "Memproses file..." : "Upload File Excel (.xlsx / .xls)"}</div>
              {!loading && (
                <>
                  <div style={s.dropSub}>Klik atau drag & drop file Excel</div>
                  <div style={{ marginTop: 16, display: "inline-block", padding: "8px 22px", background: BRI_ORANGE, color: "#fff", borderRadius: 8, fontWeight: 700, fontSize: 13 }}>
                    Pilih File
                  </div>
                </>
              )}
              <input ref={fileInputRef} type="file" accept=".xlsx,.xls" style={{ display: "none" }}
                onChange={(e) => e.target.files?.[0] && handleFile(e.target.files[0])} />
            </div>
          )}

          {tables.length > 0 && (
            <>
              <div style={s.bar}>
                <div style={s.info}>
                  ✅ <strong style={{ color: BRI_ORANGE }}>{tables.length} tabel</strong> ditemukan
                  {dateStr && <span> • <strong style={{ color: "#fff" }}>{dateStr}</strong></span>}
                  {progress && <span style={{ marginLeft: 12, color: BRI_ORANGE }}>{progress}</span>}
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button style={s.btnGhost} onClick={reset}>↩ Upload Baru</button>
                  <button style={s.btnOrange} onClick={downloadAll}>
                    ⬇️ Download Semua ({tables.length} PNG)
                  </button>
                </div>
              </div>

              <div style={s.grid}>
                {tables.map((t, idx) => (
                  <div key={idx} style={s.card}>
                    <div style={s.cardHead}>
                      <span style={s.catLabel}>{idx+1}. {t.category}</span>
                      <button style={s.btnBlue(capturing === idx)} onClick={() => downloadOne(idx)} disabled={capturing === idx}>
                        {capturing === idx ? "⏳ Saving..." : "⬇️ Download PNG"}
                      </button>
                    </div>
                    <div style={{ overflowX: "auto" }}>
                      <div ref={(el) => (tableRefs.current[idx] = el)} style={{ display: "inline-block" }}>
                        <TableCard data={t} dateStr={dateStr} />
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          {tables.length === 0 && !loading && (
            <div style={{ textAlign: "center", marginTop: 28, color: "rgba(255,255,255,0.25)", fontSize: 12 }}>
              💡 Upload file Excel → Klik "Download Semua" → 6 PNG siap pakai
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
