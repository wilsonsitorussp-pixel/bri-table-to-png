<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRI Table Exporter • Fix Align & Decimal</title>
  <!-- === DEPENDENSI === -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d1b36; padding: 20px; min-height: 100vh; color: #fff; }
    .container { max-width: 1300px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 5px; color: #E8821A; }
    .sub { font-size: 14px; opacity: 0.7; margin-bottom: 20px; }
    .upload-area { border: 2px dashed rgba(255,255,255,0.3); border-radius: 20px; padding: 30px 20px; text-align: center; background: rgba(255,255,255,0.03); margin-bottom: 20px; cursor: pointer; }
    .upload-area:hover { background: rgba(255,255,255,0.06); }
    #fileInput { display: none; }
    .toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 15px; margin: 20px 0; }
    select, button { padding: 10px 18px; border-radius: 30px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; }
    select { background: #1e3a5f; color: white; min-width: 200px; }
    .btn { background: #E8821A; color: white; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .btn-outline { background: transparent; border: 1px solid #E8821A; color: #E8821A; }
    .btn:disabled { opacity: 0.5; pointer-events: none; }
    #status { margin: 10px 0; color: #aaccff; min-height: 24px; }
    .tables-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .table-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); flex: 1 1 600px; overflow-x: auto; }
    .table-title { font-size: 18px; font-weight: bold; color: #E8821A; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .preview-table { background: white; border-radius: 8px; padding: 12px; display: inline-block; min-width: 100%; }
    table { border-collapse: collapse; font-size: 12px; background: white; width: 100%; border: 1px solid #1B3A6B; }
    th { background: #1B3A6B; color: white; padding: 8px 5px; text-align: center; border: 1px solid #2a4a7a; white-space: nowrap; }
    td { padding: 6px 5px; text-align: center; border: 1px solid #b0c4de; white-space: nowrap; color: #1e1e2f; }
    /* Kolom BRI UNIT (indeks 3) rata kiri */
    td:nth-child(3) { text-align: left; }
    th:nth-child(3) { text-align: left; }
    tr:nth-child(even) td { background: #f0f5ff; }
    .total-row td { background: #1B3A6B !important; color: white !important; font-weight: bold; }
    .total-row td:first-child { text-align: left; }
    .rate-cell { background: #FFF3E0; color: #E8821A; font-weight: bold; }
    .footer { margin-top: 30px; text-align: center; opacity: 0.5; font-size: 13px; }
  </style>
</head>
<body>
<div class="container">
  <h1>📊 BRI Table Exporter</h1>
  <div class="sub">Upload Excel → Pilih Sheet → Deteksi 6 Tabel → Download PNG</div>

  <!-- === UPLOAD AREA === -->
  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <div style="font-size: 40px; margin-bottom: 8px;">📁</div>
    <div style="font-weight: 600;">Klik untuk Pilih File Excel</div>
    <div style="font-size: 13px; opacity: 0.6;">.xlsx atau .xls</div>
  </div>
  <input type="file" id="fileInput" accept=".xlsx, .xls">

  <div id="status">⏳ Menunggu file...</div>

  <!-- === TOOLBAR === -->
  <div class="toolbar">
    <select id="sheetSelect" disabled>
      <option>-- Pilih Sheet --</option>
    </select>
    <button class="btn" id="loadSheetBtn" onclick="loadSelectedSheet()" disabled>📋 Muat Tabel</button>
    <button class="btn" id="downloadAllBtn" onclick="downloadAllTables()" disabled>⬇ Download Semua</button>
    <button class="btn-outline" onclick="resetAll()">🔄 Reset</button>
  </div>

  <div id="tablesContainer" class="tables-grid"></div>
  <div class="footer">Kolom BRI UNIT rata kiri • TOTAL data rata tengah • Koma desimal dipertahankan</div>
</div>

<script>
  (function(){
    "use strict";

    // === GLOBAL VARIABEL ===
    let workbook = null;
    let globalTables = [];
    let globalDateStr = '';
    const MAX_COLS = 8;
    const CATEGORIES = ['Realisasi', 'Recovery DH', 'Kualitas Dpk', 'Kualitas Npl', 'SIMPANAN', 'QRIS'];

    const statusEl = document.getElementById('status');
    const sheetSelect = document.getElementById('sheetSelect');
    const loadSheetBtn = document.getElementById('loadSheetBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const container = document.getElementById('tablesContainer');
    const fileInput = document.getElementById('fileInput');

    // === HELPER FUNCTIONS ===
    function getRawValue(val) {
      if (val === null || val === undefined) return '';
      return String(val).trim();
    }

    // Format angka: jika mengandung koma desimal (1,6) pertahankan, selain itu format ribuan
    function formatNumber(str) {
      if (!str) return '0';
      // Jika sudah mengandung titik ribuan, biarkan
      if (str.includes('.') && str.length > 3) return str;
      // Jika mengandung koma dan panjang pendek (misal "1,6"), anggap sebagai desimal, jangan diubah
      if (str.includes(',') && str.length <= 5) return str;
      // Coba parse sebagai angka
      const num = parseFloat(str.replace(/\./g, '').replace(',', '.'));
      if (isNaN(num)) return str;
      return num.toLocaleString('id-ID');
    }

    function formatGap(str) {
      if (!str) return '-';
      if (str.startsWith('(') && str.endsWith(')')) return str;
      const num = parseFloat(str.replace(/\./g, '').replace(',', '.'));
      if (isNaN(num)) return str;
      if (num < 0) return `(${Math.abs(num).toLocaleString('id-ID')})`;
      if (num === 0) return '-';
      return num.toLocaleString('id-ID');
    }

    function formatPercent(val) {
      if (val === null || val === undefined) return '0,0%';
      let str = String(val).trim();
      if (str === '') return '0,0%';
      if (str.includes('%')) {
        return str.replace('.', ',');
      }
      const num = parseFloat(str.replace(',', '.'));
      if (isNaN(num)) return str;
      const percentValue = num * 100;
      return percentValue.toFixed(1).replace('.', ',') + '%';
    }

    // === UPLOAD FILE ===
    fileInput.addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;
      statusEl.textContent = '📖 Membaca file...';
      try {
        const buf = await file.arrayBuffer();
        workbook = XLSX.read(buf, { type: 'array' });
        sheetSelect.innerHTML = '';
        workbook.SheetNames.forEach((name, idx) => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          if (idx === 0) opt.selected = true;
          sheetSelect.appendChild(opt);
        });
        sheetSelect.disabled = false;
        loadSheetBtn.disabled = false;
        statusEl.textContent = `✅ File dibaca. ${workbook.SheetNames.length} sheet.`;
      } catch (err) {
        statusEl.textContent = '❌ Gagal membaca file: ' + err.message;
      }
    });

    // === LOAD SHEET & PARSING ===
    window.loadSelectedSheet = function() {
      if (!workbook) return;
      const sheetName = sheetSelect.value;
      if (!sheetName) return;
      statusEl.textContent = `🔍 Memproses sheet "${sheetName}"...`;
      try {
        const ws = workbook.Sheets[sheetName];
        const rawData = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        const data = rawData.map(row => {
          const r = row.slice(0, MAX_COLS);
          while (r.length < MAX_COLS) r.push('');
          return r;
        });

        let dateStr = '';
        for (let i = 0; i < Math.min(10, data.length); i++) {
          for (let cell of data[i]) {
            const s = String(cell);
            if (s.match(/\d{2}\/\d{2}\/\d{4}/)) { dateStr = s; break; }
          }
        }
        globalDateStr = dateStr;

        const tables = [];
        let i = 0;
        while (i < data.length) {
          const row = data[i];
          if (!row || row.every(c => c === '')) { i++; continue; }
          const firstCell = getRawValue(row[0]).toUpperCase();
          if (firstCell !== 'NO' && firstCell !== 'NO.') { i++; continue; }

          let category = null;
          for (let cat of CATEGORIES) {
            if (row.some(c => getRawValue(c).toUpperCase() === cat.toUpperCase())) {
              category = cat;
              break;
            }
          }
          if (!category) { i++; continue; }

          const mainHeader = [...row];
          const catIndex = mainHeader.findIndex(c => getRawValue(c).toUpperCase() === category.toUpperCase());

          let subHeader = null;
          let subIndex = -1;
          for (let j = i+1; j < i+5 && j < data.length; j++) {
            const cand = data[j];
            const str = cand.map(c => getRawValue(c).toUpperCase()).join(' ');
            if (str.includes('KOMITMEN') || str.includes('HASIL') || str.includes('GAP')) {
              subHeader = [...cand];
              subIndex = j;
              break;
            }
          }

          let subCols = [];
          if (subHeader) {
            for (let col = catIndex; col < subHeader.length; col++) {
              const val = getRawValue(subHeader[col]).toUpperCase();
              if (['KOMITMEN', 'HASIL', 'GAP', 'REALISASI'].includes(val)) {
                subCols.push({ label: subHeader[col], colIndex: col });
              } else if (val === '' && subCols.length > 0) break;
            }
          }

          const hasSub = subCols.length > 0;
          const dataStartCol = hasSub ? subCols[0].colIndex : catIndex;
          const dataColCount = hasSub ? subCols.length : 1;
          const dataStartRow = hasSub ? subIndex + 1 : i + 1;

          const rows = [];
          for (let r = dataStartRow; r < dataStartRow + 30 && r < data.length; r++) {
            const dRow = data[r];
            if (dRow.every(c => c === '')) break;
            rows.push([...dRow]);
          }

          if (rows.length > 0) {
            tables.push({ category, mainHeader, subHeader, subCols, catIndex, dataStartCol, dataColCount, rows });
          }
          i = dataStartRow + rows.length;
        }

        globalTables = tables;
        renderTables();
        statusEl.textContent = `✅ ${tables.length} tabel ditemukan. ${dateStr}`;
        downloadAllBtn.disabled = tables.length === 0;
      } catch (err) {
        statusEl.textContent = '❌ Error: ' + err.message;
        console.error(err);
      }
    };

    // === RENDER TABEL ===
    function renderTables() {
      container.innerHTML = '';
      if (globalTables.length === 0) {
        container.innerHTML = '<div style="color:#aaa; padding:20px;">Tidak ada tabel.</div>';
        return;
      }

      globalTables.forEach((t, idx) => {
        const { category, mainHeader, subCols, catIndex, dataStartCol, dataColCount, rows } = t;
        const hasSub = subCols.length > 0;

        const card = document.createElement('div');
        card.className = 'table-card';
        const titleDiv = document.createElement('div');
        titleDiv.className = 'table-title';
        titleDiv.innerHTML = `${idx+1}. ${category} <button class="btn" style="padding:6px 14px;font-size:13px;" onclick="downloadSingle(${idx})">⬇ PNG</button>`;
        card.appendChild(titleDiv);

        const previewDiv = document.createElement('div');
        previewDiv.className = 'preview-table';
        const table = document.createElement('table');

        // === THEAD ===
        const thead = document.createElement('thead');
        const tr1 = document.createElement('tr');
        for (let col = 0; col < mainHeader.length; col++) {
          if (col === catIndex) {
            const th = document.createElement('th');
            th.colSpan = dataColCount;
            th.style.background = '#E8821A';
            th.textContent = category;
            tr1.appendChild(th);
          } else if (col > catIndex && col < catIndex + dataColCount) {
            // skip
          } else {
            const th = document.createElement('th');
            th.textContent = mainHeader[col] || '';
            tr1.appendChild(th);
          }
        }
        if (hasSub) {
          tr1.querySelectorAll('th').forEach(th => { if (th.colSpan !== dataColCount) th.rowSpan = 2; });
        }
        thead.appendChild(tr1);

        if (hasSub) {
          const tr2 = document.createElement('tr');
          subCols.forEach(sc => {
            const th = document.createElement('th');
            th.textContent = sc.label;
            tr2.appendChild(th);
          });
          thead.appendChild(tr2);
        }
        table.appendChild(thead);

        // === TBODY ===
        const tbody = document.createElement('tbody');
        rows.forEach((row, ri) => {
          const isTotal = row.some(cell => getRawValue(cell).toUpperCase().includes('TOTAL'));
          const tr = document.createElement('tr');
          if (isTotal) tr.classList.add('total-row');

          if (isTotal) {
            // Kolom sebelum Σ MANTRI (indeks 0 sampai catIndex-2) digabung jadi "TOTAL"
            const mergeCount = catIndex - 1; // Σ MANTRI ada di indeks catIndex-1
            if (mergeCount > 0) {
              const tdTotal = document.createElement('td');
              tdTotal.colSpan = mergeCount;
              tdTotal.textContent = 'TOTAL';
              tdTotal.style.textAlign = 'left';
              tdTotal.style.fontWeight = 'bold';
              tr.appendChild(tdTotal);
            }

            // Kolom Σ MANTRI (indeks catIndex-1)
            const tdMantri = document.createElement('td');
            let mantriVal = getRawValue(row[catIndex - 1]);
            tdMantri.textContent = mantriVal === '' ? '0' : formatNumber(mantriVal);
            tdMantri.style.textAlign = 'center';
            tr.appendChild(tdMantri);

            // Sel data (Komitmen, Hasil, Gap)
            for (let d = 0; d < dataColCount; d++) {
              const td = document.createElement('td');
              let val = getRawValue(row[dataStartCol + d]);
              if (val === '') val = (d === dataColCount-1) ? '-' : '0';
              if (d === dataColCount - 1) {
                td.textContent = formatGap(val);
              } else {
                td.textContent = formatNumber(val);
              }
              td.style.textAlign = 'center'; // Pastikan rata tengah
              tr.appendChild(td);
            }

            // Sukses Rate
            const rateIdx = dataStartCol + dataColCount;
            const td = document.createElement('td');
            td.classList.add('rate-cell');
            let rateVal = (rateIdx < row.length) ? getRawValue(row[rateIdx]) : '';
            if (rateVal === '') rateVal = '0,0%';
            td.textContent = formatPercent(rateVal);
            tr.appendChild(td);
          } else {
            // Baris data biasa
            for (let col = 0; col < catIndex; col++) {
              const td = document.createElement('td');
              let val = getRawValue(row[col]);
              td.textContent = val;
              if (col === catIndex - 1) td.style.textAlign = 'center'; // Σ MANTRI
              tr.appendChild(td);
            }
            for (let d = 0; d < dataColCount; d++) {
              const td = document.createElement('td');
              let val = getRawValue(row[dataStartCol + d]);
              if (val === '') val = (d === dataColCount-1) ? '-' : '0';
              if (d === dataColCount - 1) {
                td.textContent = formatGap(val);
              } else {
                td.textContent = formatNumber(val);
              }
              tr.appendChild(td);
            }
            const rateIdx = dataStartCol + dataColCount;
            const td = document.createElement('td');
            td.classList.add('rate-cell');
            let rateVal = (rateIdx < row.length) ? getRawValue(row[rateIdx]) : '';
            if (rateVal === '') rateVal = '0,0%';
            td.textContent = formatPercent(rateVal);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);

        previewDiv.appendChild(table);
        card.appendChild(previewDiv);
        container.appendChild(card);
      });
    }

    // === DOWNLOAD ===
    window.downloadSingle = async function(index) {
      const card = container.children[index];
      const previewDiv = card?.querySelector('.preview-table');
      if (!previewDiv) return;
      try {
        const canvas = await html2canvas(previewDiv, {
          scale: 2.5,
          backgroundColor: '#ffffff',
          logging: false,
          allowTaint: false,
          useCORS: true
        });
        const link = document.createElement('a');
        const cat = globalTables[index].category.replace(/ /g, '_');
        link.download = `${cat}_${globalDateStr.replace(/\//g, '-')}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) {
        alert('Gagal download: ' + e.message);
      }
    };

    window.downloadAllTables = async function() {
      for (let i = 0; i < globalTables.length; i++) {
        statusEl.textContent = `📸 Mendownload ${i+1}/${globalTables.length}...`;
        await downloadSingle(i);
        await new Promise(r => setTimeout(r, 400));
      }
      statusEl.textContent = `✅ Selesai! ${globalTables.length} gambar diunduh.`;
    };

    window.resetAll = function() {
      workbook = null;
      globalTables = [];
      container.innerHTML = '';
      sheetSelect.innerHTML = '<option>-- Pilih Sheet --</option>';
      sheetSelect.disabled = true;
      loadSheetBtn.disabled = true;
      downloadAllBtn.disabled = true;
      statusEl.textContent = '⏳ Menunggu file...';
      fileInput.value = '';
    };

  })();
</script>
</body>
</html>
